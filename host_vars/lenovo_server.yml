---
# Host variables for lenovo_server

# SSD media drives for Jellyfin (Storage Host for NFS)
# Set device to empty string to skip that drive's setup.
# Set format: true only when you intend to format (wipes the partition).
ssd_media_drives:
  - device: "/dev/sdb2"
    format: false
    mount_path: "/mnt/ssd_media"
  - device: "/dev/sdc1"
    format: false
    mount_path: "/mnt/ssd_media2"

proxy_hosts:
  - domain: "{{ pihole_container_name }}.{{ local_domain }}"
    host: "{{ pihole_container_name }}"
    port: "{{ pihole_host_port }}"
    scheme: "http"