---
# User Management Tasks - Create and configure VPN users (Idempotent)

- name: Check which users already exist  
  docker_swarm_container_exec:
    container_id: "{{ openvpn_container_id.stdout }}"
    command: "sacli --user '{{ item.username }}' UserPropGet 2>&1 | grep -q '\"type\".*:.*\"user_connect\"' && echo '{{ item.username }}' || echo ''"
  loop: "{{ openvpn_config_users }}"
  register: user_checks
  delegate_to: "{{ openvpn_config_target_host }}"
  changed_when: false
  failed_when: false
  no_log: true

- name: Build list of existing users
  ansible.builtin.set_fact:
    existing_users:
      stdout_lines: "{{ user_checks.results | map(attribute='stdout') | map('trim') | select() | list }}"

- name: Display existing users
  ansible.builtin.debug:
    msg: "Existing OpenVPN users: {{ existing_users.stdout_lines }}"

- name: Initialize user change tracking
  ansible.builtin.set_fact:
    openvpn_users_changed: false

- name: Configure VPN users
  ansible.builtin.include_tasks: user_configure.yml
  loop: "{{ openvpn_config_users }}"
  loop_control:
    loop_var: user
    label: "{{ user.username }}"

- name: Determine which configured users are new (not yet present in the server)
  ansible.builtin.set_fact:
    _openvpn_new_users: >-
      {{ openvpn_config_users | map(attribute='username') | list
         | difference(existing_users.stdout_lines) }}

- name: Restart OpenVPN to persist new user changes
  docker_swarm_container_exec:
    container_id: "{{ openvpn_container_id.stdout }}"
    command: "sacli start"
  register: openvpn_user_restart
  delegate_to: "{{ openvpn_config_target_host }}"
  when: _openvpn_new_users | length > 0

- name: Wait for OpenVPN to reload after user changes
  ansible.builtin.pause:
    seconds: 10
  when: _openvpn_new_users | length > 0

- name: Verify users were created successfully
  docker_swarm_container_exec:
    container_id: "{{ openvpn_container_id.stdout }}"
    command: "sacli --user '{{ item.username }}' UserPropGet 2>&1 | grep -q '\"type\".*:.*\"user_connect\"' && echo 'EXISTS' || echo 'MISSING'"
  loop: "{{ openvpn_config_users }}"
  register: user_verification
  delegate_to: "{{ openvpn_config_target_host }}"
  changed_when: false
  failed_when: false
  no_log: true

- name: Build list of successfully created users
  ansible.builtin.set_fact:
    final_users:
      stdout_lines: "{{ openvpn_config_users | zip(user_verification.results) | selectattr('1.stdout', 'search', 'EXISTS') | map(attribute='0.username') | list }}"

- name: Display user management summary
  ansible.builtin.debug:
    msg: |
      VPN User Management Complete:
      - Total users configured: {{ openvpn_config_users | length }}
      - Current users in system: {{ final_users.stdout_lines | length }}
      - Users: {{ final_users.stdout_lines | join(', ') if final_users.stdout_lines else 'None' }}
