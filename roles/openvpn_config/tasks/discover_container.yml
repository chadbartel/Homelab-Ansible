---
# OpenVPN container discovery task (standalone Docker)
#
# Locates the OpenVPN Access Server container on the target host.
# Container name is derived from the Compose project+service naming convention:
#   vpn-stack_openvpn-as  ->  vpn-stack-openvpn-as-1
#
# Sets the following fact (as register result to preserve .stdout interface):
#   - openvpn_container_id: register result with .stdout = container ID

- name: Get OpenVPN container ID from target host
  ansible.builtin.shell: |
    docker ps \
      --filter "name={{ openvpn_config_container_name }}" \
      --filter "status=running" \
      --format '{% raw %}{{.ID}}{% endraw %}' | head -n 1
  register: openvpn_container_id
  changed_when: false
  failed_when: openvpn_container_id.stdout == ""
  delegate_to: "{{ openvpn_config_target_host }}"

- name: Display discovered OpenVPN container information
  ansible.builtin.debug:
    msg: |
      OpenVPN Container Discovery:
      - Target Host: {{ openvpn_config_target_host }}
      - Container Name: {{ openvpn_config_container_name }}
      - Container ID: {{ openvpn_container_id.stdout }}
