---
# Verify IP forwarding is enabled (essential for exit node and subnet router modes)

- name: Check IPv4 forwarding is enabled
  ansible.builtin.command:
    cmd: sysctl net.ipv4.ip_forward
  register: ipv4_forward_check
  changed_when: false
  tags: ["tailscale", "verify"]

- name: Check IPv6 forwarding is enabled (optional)
  ansible.builtin.command:
    cmd: sysctl net.ipv6.conf.all.forwarding
  register: ipv6_forward_check
  changed_when: false
  tags: ["tailscale", "verify"]

- name: Verify IPv4 forwarding matches expected value
  ansible.builtin.assert:
    that:
      - "'net.ipv4.ip_forward = 1' in ipv4_forward_check.stdout"
    fail_msg: "IPv4 forwarding is not enabled! Exit node and subnet router will not work."
    success_msg: "IPv4 forwarding is enabled."
  tags: ["tailscale", "verify"]

- name: Display IP forwarding verification
  ansible.builtin.debug:
    msg: |
      ✅ IP Forwarding Configuration Verified
      {{ ipv4_forward_check.stdout }}
      {{ ipv6_forward_check.stdout }}
      
      Exit Node mode: ✅ Ready
      Subnet Router mode: ✅ Ready
  tags: ["tailscale", "verify"]
