---
# Example: Deploy Tailscale on all servers
# Run: ansible-playbook roles/tailscale/examples/deploy.yml

- name: Deploy Tailscale VPN on all homelab servers
  hosts: homelab_servers
  become: true
  vars_files:
    - vars.yml
    - vault.yml
  tasks:
    - name: Deploy Tailscale container
      ansible.builtin.include_role:
        name: tailscale
      tags: ["tailscale", "deploy"]

