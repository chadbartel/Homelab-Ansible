---
# Jellyfin startup wizard completion task
#
# Completes the initial Jellyfin setup wizard in an idempotent way.
# Only runs if the wizard has not been completed.
#
# Required variables:
#   - jellyfin_config_admin_user: Admin username
#   - jellyfin_config_admin_password: Admin password
#
# Usage:
#   - include_tasks: setup_wizard.yml
#     vars:
#       target_url: "http://127.0.0.1:8096"  # Optional override

- name: Set target Jellyfin URL
  ansible.builtin.set_fact:
    jellyfin_target_url: "{{ target_url | default('http://127.0.0.1:' + (jellyfin_config_web_port | string)) }}"

- name: Check if setup wizard has been completed (via /Startup/Configuration endpoint)
  # NOTE: This endpoint returns 200 both before AND after wizard completion in
  # Jellyfin 10.8+. It is used only to detect a completely unreachable service,
  # NOT as a reliable wizard-completion signal. The auth check below is authoritative.
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Startup/Configuration"
    method: GET
    status_code: [200, 401, 404]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: jellyfin_startup_check
  failed_when: false

- name: Check Jellyfin first-time setup state via /Startup/User
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Startup/User"
    method: GET
    status_code: [200, 401]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: jellyfin_startup_user_check
  failed_when: false

- name: Try to authenticate to verify admin user exists (authoritative wizard completion check)
  # Uses Pw (plaintext→bcrypt) — required for Jellyfin 10.9+.
  # This is only meaningful once first-time setup is already complete.
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/AuthenticateByName"
    method: POST
    headers:
      X-Emby-Authorization: 'MediaBrowser Client="Ansible", Device="Homelab-Ansible", DeviceId="ansible-{{ inventory_hostname }}", Version="1.0.0"'
      Content-Type: "application/json"
    body_format: json
    body:
      Username: "{{ jellyfin_config_admin_user }}"
      Pw: "{{ jellyfin_config_admin_password }}"
    status_code: [200, 400, 401, 404]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: jellyfin_wizard_auth_check
  failed_when: false
  when: jellyfin_startup_user_check.status == 401

- name: Ensure Jellyfin container facts are available for startup recovery
  ansible.builtin.include_tasks: discover_container.yml
  when: jellyfin_startup_user_check.status == 401

- name: Get Jellyfin config mount source path for startup recovery
  ansible.builtin.shell:
    cmd: >-
      docker inspect -f '{{ '{{' }}range .Mounts{{ '}}' }}{{ '{{' }}if eq .Destination "/config"{{ '}}' }}{{ '{{' }}.Source{{ '}}' }}{{ '{{' }}end{{ '}}' }}{{ '{{' }}end{{ '}}' }}' {{ jellyfin_container_id }}
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  register: jellyfin_startup_config_mount
  changed_when: false
  when: jellyfin_startup_user_check.status == 401

- name: Set Jellyfin startup recovery paths
  ansible.builtin.set_fact:
    jellyfin_startup_db_path: "{{ jellyfin_startup_config_mount.stdout | trim }}/data/jellyfin.db"
    jellyfin_system_xml_path: "{{ jellyfin_startup_config_mount.stdout | trim }}/config/system.xml"
  when: jellyfin_startup_user_check.status == 401

- name: Count Jellyfin users in database
  ansible.builtin.shell: |
    python3 - <<'PY'
    import sqlite3

    db_path = {{ jellyfin_startup_db_path | to_json }}
    conn = sqlite3.connect(db_path, timeout=30)
    cur = conn.cursor()
    cur.execute("SELECT COUNT(*) FROM Users")
    print(cur.fetchone()[0])
    conn.close()
    PY
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  register: jellyfin_db_user_count
  changed_when: false
  when: jellyfin_startup_user_check.status == 401

- name: Detect broken startup-complete state with no users
  ansible.builtin.set_fact:
    jellyfin_broken_startup_state: >-
      {{
        jellyfin_startup_user_check.status == 401
        and (jellyfin_db_user_count.stdout | trim | int) == 0
      }}

- name: Back up Jellyfin system.xml before reopening startup wizard
  ansible.builtin.shell: |
    python3 - <<'PY'
    import pathlib
    import shutil

    src = pathlib.Path({{ jellyfin_system_xml_path | to_json }})
    shutil.copy2(src, pathlib.Path(str(src) + '.ansible.bak'))
    print(src)
    PY
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  changed_when: false
  when: jellyfin_broken_startup_state | default(false) | bool

- name: Reopen Jellyfin startup wizard when no users exist
  ansible.builtin.shell: |
    python3 - <<'PY'
    import pathlib

    path = pathlib.Path({{ jellyfin_system_xml_path | to_json }})
    text = path.read_text()
    old = '<IsStartupWizardCompleted>true</IsStartupWizardCompleted>'
    new = '<IsStartupWizardCompleted>false</IsStartupWizardCompleted>'
    if old not in text:
        raise SystemExit('startup wizard flag not found in system.xml')
    path.write_text(text.replace(old, new, 1))
    print('rewrote', path)
    PY
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  when: jellyfin_broken_startup_state | default(false) | bool

- name: Restart Jellyfin after reopening startup wizard
  ansible.builtin.shell:
    cmd: "docker restart {{ jellyfin_container_id }}"
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  changed_when: true
  when: jellyfin_broken_startup_state | default(false) | bool

- name: Wait briefly after Jellyfin restart
  ansible.builtin.pause:
    seconds: 8
  when: jellyfin_broken_startup_state | default(false) | bool

- name: Re-check Jellyfin startup state after reopening wizard
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Startup/User"
    method: GET
    status_code: [200, 401]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: jellyfin_startup_user_check_after_recovery
  failed_when: false
  when: jellyfin_broken_startup_state | default(false) | bool

- name: Determine if wizard needs to be run
  # GET /Startup/User returns 200 only while first-time setup is still active.
  # Once the startup wizard is complete, the same endpoint returns 401 without auth.
  ansible.builtin.set_fact:
    wizard_needs_completion: >-
      {{
        (jellyfin_startup_user_check_after_recovery.status | default(jellyfin_startup_user_check.status)) == 200
      }}

- name: Display setup wizard status
  ansible.builtin.debug:
    msg: |
      {% if wizard_needs_completion %}
      ⚙️ Setup wizard needs completion
      Reason: Startup wizard endpoint is open (GET /Startup/User returned 200)
      {% if jellyfin_broken_startup_state | default(false) %}
      Recovery: Reopened startup wizard because Jellyfin had zero users while marked as completed.
      {% endif %}
      {% else %}
      ✅ Setup wizard already completed or locked behind auth
      Startup/User status: {{ jellyfin_startup_user_check_after_recovery.status | default(jellyfin_startup_user_check.status | default('N/A')) }}
      Auth check status: {{ jellyfin_wizard_auth_check.status | default('N/A') }}
      {% endif %}
  when: jellyfin_config_display_results | default(true)

- name: Complete Jellyfin startup wizard - Set UI culture
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Startup/Configuration"
    method: POST
    body_format: json
    body:
      ServerName: "{{ jellyfin_config_server_name }}"
      UICulture: "{{ jellyfin_config_ui_culture }}"
      MetadataCountryCode: "{{ jellyfin_config_metadata_country }}"
      PreferredMetadataLanguage: "{{ jellyfin_config_preferred_metadata_language }}"
    status_code: [200, 204]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  when: wizard_needs_completion
  register: wizard_config

- name: Complete Jellyfin startup wizard - Configure remote access
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Startup/RemoteAccess"
    method: POST
    body_format: json
    body:
      EnableRemoteAccess: "{{ not (jellyfin_config_disable_remote_access | bool) }}"
    status_code: [200, 204]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  when: wizard_needs_completion
  register: wizard_remote

- name: Validate admin credentials are provided
  ansible.builtin.assert:
    that:
      - jellyfin_config_admin_user is defined
      - jellyfin_config_admin_user | length > 0
      - jellyfin_config_admin_password is defined
      - jellyfin_config_admin_password | length > 0
    fail_msg: "Admin credentials not provided. Set jellyfin_config_admin_user and jellyfin_config_admin_password"
    success_msg: "Admin credentials validated"
  when: wizard_needs_completion

- name: Complete Jellyfin startup wizard - Create admin user
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Startup/User"
    method: POST
    body_format: json
    body:
      Name: "{{ jellyfin_config_admin_user }}"
      Password: "{{ jellyfin_config_admin_password }}"
    status_code: [200, 204]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  when: wizard_needs_completion
  register: wizard_user

- name: Complete Jellyfin startup wizard - Finalize setup
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Startup/Complete"
    method: POST
    body_format: json
    body: {}
    status_code: [200, 204]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  when: wizard_needs_completion
  register: wizard_complete

- name: Wait for wizard completion to settle
  ansible.builtin.pause:
    seconds: 10
    prompt: "Waiting for setup wizard completion to settle..."
  when:
    - wizard_needs_completion

- name: Verify configured admin credentials after wizard completion
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/AuthenticateByName"
    method: POST
    headers:
      X-Emby-Authorization: 'MediaBrowser Client="Ansible", Device="Homelab-Ansible", DeviceId="ansible-{{ inventory_hostname }}", Version="1.0.0"'
      Content-Type: "application/json"
    body_format: json
    body:
      Username: "{{ jellyfin_config_admin_user }}"
      Pw: "{{ jellyfin_config_admin_password }}"
    status_code: [200]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: jellyfin_auth_after_wizard
  when: wizard_needs_completion

- name: Display wizard completion status
  ansible.builtin.debug:
    msg: |
      {% if wizard_needs_completion %}
      ✅ Jellyfin setup wizard completed successfully
      Server Name: {{ jellyfin_config_server_name }}
      Admin User: {{ jellyfin_config_admin_user }}
      Auth check: {{ jellyfin_auth_after_wizard.status | default('N/A') }}
      {% else %}
      ℹ️ Wizard was already completed, skipping
      {% endif %}
  when: jellyfin_config_display_results | default(true)
