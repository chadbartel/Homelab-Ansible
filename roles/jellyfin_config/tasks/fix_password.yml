---
# Repair an empty or mismatched password hash for the Jellyfin admin user.
#
# Root cause: upgrading Jellyfin across major versions (e.g., Swarm 10.7→10.9+)
# clears old SHA-256 password hashes that are incompatible with the new bcrypt
# storage. The user account survives in the database but PasswordHash.Parse("")
# throws ArgumentException, causing every web-UI login attempt to return HTTP 400.
#
# Detection: attempt auth via the current "Pw" path (plain-text, strict).
#   - HTTP 200 → hash is valid and matches vault password, nothing to do.
#   - HTTP 400 → hash is empty/corrupt, repair needed (always runs).
#   - HTTP 401 → valid hash but doesn't match vault password; repair runs only
#                when jellyfin_config_force_password_reset: true is set.
#
# Repair: uses Jellyfin's ForgotPassword/PIN recovery flow, which bypasses
# password verification entirely. The ForgotPassword endpoint only accepts
# requests from the local network, so the call is delegated to lenovo_server
# (the Jellyfin host) so it arrives from localhost → Docker bridge, which
# Jellyfin classifies as local.

- name: Set target Jellyfin URL
  ansible.builtin.set_fact:
    jellyfin_target_url: "{{ target_url | default('http://127.0.0.1:' + (jellyfin_config_web_port | string)) }}"

- name: Test admin login via Pw path (detects empty hash or mismatched password)
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/AuthenticateByName"
    method: POST
    headers:
      X-Emby-Authorization: >-
        MediaBrowser Client="Ansible", Device="Homelab-Ansible",
        DeviceId="ansible-{{ inventory_hostname }}", Version="1.0.0"
      Content-Type: "application/json"
    body_format: json
    body:
      Username: "{{ jellyfin_config_admin_user }}"
      Pw: "{{ jellyfin_config_admin_password }}"
    status_code: [200, 400, 401]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: pw_path_test
  become: false
  failed_when: false
  no_log: true

- name: Determine if password repair is needed
  ansible.builtin.set_fact:
    # 400 = empty/corrupt hash (always repair)
    # 401 = valid hash but wrong password (repair only when force flag is set)
    _jellyfin_repair_needed: "{{ pw_path_test.status == 400 or (pw_path_test.status == 401 and jellyfin_config_force_password_reset | default(false) | bool) }}"

- name: Debug password hash state
  ansible.builtin.debug:
    msg: >-
      Password hash check: HTTP {{ pw_path_test.status }}.
      {{
        'Hash valid and matches vault password — no repair needed.' if pw_path_test.status == 200 else
        'Empty/corrupt hash detected — will repair via ForgotPassword PIN flow.' if pw_path_test.status == 400 else
        ('Vault password mismatch (HTTP 401) — will force-reset via PIN flow.' if _jellyfin_repair_needed | bool
        else 'Vault password mismatch (HTTP 401) — set jellyfin_config_force_password_reset: true to reset. Check vault_jellyfin_user1_password matches your Jellyfin login password.')
      }}
  when: jellyfin_config_display_results | default(true)

# ── ForgotPassword/PIN recovery ──────────────────────────────────────────────
#
# These tasks delegate to lenovo_server so the HTTP requests come from
# localhost, which Jellyfin classifies as a local-network request (required
# for the ForgotPassword endpoint to issue a PIN instead of "ContactAdmin").

- name: Trigger ForgotPassword to generate recovery PIN
  ansible.builtin.uri:
    url: "http://localhost:{{ jellyfin_config_web_port }}/Users/ForgotPassword"
    method: POST
    body_format: json
    body:
      EnteredUsername: "{{ jellyfin_config_admin_user }}"
    status_code: [200]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: forgot_pw_result
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: false
  when: _jellyfin_repair_needed | bool

- name: Verify ForgotPassword returned a PIN (not ContactAdmin)
  ansible.builtin.assert:
    that:
      - forgot_pw_result.json.Action == 'PinCode'
      - forgot_pw_result.json.PinFile is defined
      - forgot_pw_result.json.PinFile | length > 0
    fail_msg: >-
      ForgotPassword returned Action={{ forgot_pw_result.json.Action }} instead of PinCode.
      Jellyfin did not classify the request as local. Check that lenovo_server is reachable
      via delegate_to and that Docker is exposing port {{ jellyfin_config_web_port }} on localhost.
    success_msg: "Recovery PIN generated — PIN file: {{ forgot_pw_result.json.PinFile }}"
  when: _jellyfin_repair_needed | bool

- name: Get Jellyfin container name
  ansible.builtin.shell:
    cmd: "docker ps --filter 'name=jellyfin' --format '{{ '{{' }}.Names{{ '}}' }}' | head -1"
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  register: jellyfin_container_name
  changed_when: false
  when: _jellyfin_repair_needed | bool

- name: Read PIN record from container filesystem
  ansible.builtin.shell:
    cmd: "docker exec {{ jellyfin_container_name.stdout }} cat '{{ forgot_pw_result.json.PinFile }}'"
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  register: pin_file_raw
  no_log: true
  changed_when: false
  when: _jellyfin_repair_needed | bool

- name: Extract PIN code from recovery record
  ansible.builtin.set_fact:
    jellyfin_recovery_pin: "{{ (pin_file_raw.stdout | from_json).Pin }}"
  no_log: true
  when: _jellyfin_repair_needed | bool

- name: Reset password using recovery PIN
  ansible.builtin.uri:
    url: "http://localhost:{{ jellyfin_config_web_port }}/Users/ForgotPassword/Pin"
    method: POST
    body_format: json
    body:
      Pin: "{{ jellyfin_recovery_pin }}"
      NewPw: "{{ jellyfin_config_admin_password }}"
    status_code: [200]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: false
  when: _jellyfin_repair_needed | bool
  no_log: true
  register: pin_reset_result

- name: Verify PIN reset returned HTTP 200
  ansible.builtin.assert:
    that:
      - pin_reset_result.status == 200
    fail_msg: >-
      PIN reset returned HTTP {{ pin_reset_result.status }} — password was NOT changed.
      Check that the PIN file was read correctly and the ForgotPassword/Pin endpoint is reachable.
    success_msg: "PIN reset accepted (HTTP 200) — password updated to vault value."
  when:
    - _jellyfin_repair_needed | bool
    - pin_reset_result is defined
    - pin_reset_result is not skipped

- name: Confirm password repair result
  ansible.builtin.debug:
    msg: >-
      {{
        'Password hash repaired successfully (HTTP ' + (pin_reset_result.status | string) + '). Web UI login will now work.'
        if (pin_reset_result is defined and pin_reset_result is not skipped and pin_reset_result.status is defined)
        else 'Password hash was already valid — no change.'
      }}
  when: jellyfin_config_display_results | default(true)

