---
# Repair an empty or mismatched password hash for the Jellyfin admin user.
#
# Root cause: upgrading Jellyfin across major versions (e.g., Swarm 10.7→10.9+)
# clears old SHA-256 password hashes that are incompatible with the new bcrypt
# storage. The user account survives in the database but PasswordHash.Parse("")
# throws ArgumentException, causing every web-UI login attempt to return HTTP 400.
#
# Detection: attempt auth via the current "Pw" path (plain-text, strict).
#   - HTTP 200 → hash is valid and matches vault password, nothing to do.
#   - HTTP 400 → hash is empty/corrupt, repair needed (always runs).
#   - HTTP 401 → valid hash but doesn't match vault password; repair runs only
#                when jellyfin_config_force_password_reset: true is set.
#
# Repair: uses Jellyfin's ForgotPassword/PIN recovery flow, which bypasses
# password verification entirely. The ForgotPassword endpoint only accepts
# requests from the local network, so the call is delegated to the configured
# Jellyfin host node
# (the Jellyfin host) so it arrives from localhost → Docker bridge, which
# Jellyfin classifies as local.

- name: Set target Jellyfin URL
  ansible.builtin.set_fact:
    jellyfin_target_url: "{{ target_url | default('http://127.0.0.1:' + (jellyfin_config_web_port | string)) }}"

- name: Test admin login via Pw path (detects empty hash or mismatched password)
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/AuthenticateByName"
    method: POST
    headers:
      X-Emby-Authorization: >-
        MediaBrowser Client="Ansible", Device="Homelab-Ansible",
        DeviceId="ansible-{{ inventory_hostname }}", Version="1.0.0"
      Content-Type: "application/json"
    body_format: json
    body:
      Username: "{{ jellyfin_config_admin_user }}"
      Pw: "{{ jellyfin_config_admin_password }}"
    status_code: [200, 400, 401, 404]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: pw_path_test
  become: false
  failed_when: false
  no_log: true

- name: Refuse password repair when admin user does not exist
  ansible.builtin.assert:
    that:
      - pw_path_test.status != 404
    fail_msg: >-
      Jellyfin admin user '{{ jellyfin_config_admin_user }}' does not exist yet, so password repair cannot run.
      The setup wizard must create the user first.

- name: Determine if password repair is needed
  ansible.builtin.set_fact:
    # 400 = empty/corrupt hash (always repair)
    # 401 = valid hash but wrong password (repair only when force flag is set)
    _jellyfin_repair_needed: "{{ pw_path_test.status == 400 or (pw_path_test.status == 401 and jellyfin_config_force_password_reset | default(false) | bool) }}"

- name: Debug password hash state
  ansible.builtin.debug:
    msg: >-
      Password hash check: HTTP {{ pw_path_test.status }}.
      {{
        'Hash valid and matches vault password — no repair needed.' if pw_path_test.status == 200 else
        'Empty/corrupt hash detected — will repair via ForgotPassword PIN flow.' if pw_path_test.status == 400 else
        ('Vault password mismatch (HTTP 401) — will force-reset via PIN flow.' if _jellyfin_repair_needed | bool
        else 'Vault password mismatch (HTTP 401) — set jellyfin_config_force_password_reset: true to reset. Check vault_jellyfin_user1_password matches your Jellyfin login password.')
      }}
  when: jellyfin_config_display_results | default(true)

# ── Deterministic recovery fallback ──────────────────────────────────────────
#
# Jellyfin's troubleshooting docs explicitly recommend direct SQLite fixes when
# account recovery features fail. The upstream source for AuthenticateUser also
# shows that a user whose stored Password is NULL can authenticate with an empty
# password. We use that documented/verified behavior here:
#
# 1. Back up the Jellyfin DB files.
# 2. Clear the target user's password and reset lockout state in SQLite.
# 3. Authenticate once with an empty password.
# 4. Set the real vault password via the supported authenticated API.
#
# This avoids relying on ForgotPassword returning a PinFile path that, on this
# installed server, is never actually written to disk.

- name: Ensure Jellyfin container facts are available
  ansible.builtin.include_tasks: discover_container.yml
  when:
    - _jellyfin_repair_needed | bool
    - jellyfin_container_id is not defined

- name: Get Jellyfin container reference
  ansible.builtin.set_fact:
    jellyfin_container_ref: "{{ jellyfin_container_id | trim }}"
  when: _jellyfin_repair_needed | bool

- name: Verify Jellyfin container was found
  ansible.builtin.assert:
    that:
      - jellyfin_container_ref | length > 0
    fail_msg: "Unable to find running Jellyfin container on {{ jellyfin_config_target_node }}"
  when: _jellyfin_repair_needed | bool

- name: Get Jellyfin config mount source path
  ansible.builtin.shell:
    cmd: >-
      docker inspect -f '{{ '{{' }}range .Mounts{{ '}}' }}{{ '{{' }}if eq .Destination "/config"{{ '}}' }}{{ '{{' }}.Source{{ '}}' }}{{ '{{' }}end{{ '}}' }}{{ '{{' }}end{{ '}}' }}' {{ jellyfin_container_ref }}
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  register: jellyfin_config_mount
  when: _jellyfin_repair_needed | bool

- name: Set Jellyfin database path
  ansible.builtin.set_fact:
    jellyfin_db_path: "{{ jellyfin_config_mount.stdout | trim }}/data/jellyfin.db"
  when: _jellyfin_repair_needed | bool

- name: Verify Jellyfin database path was discovered
  ansible.builtin.assert:
    that:
      - jellyfin_db_path | length > 0
    fail_msg: "Unable to determine Jellyfin database path from the running container mounts."
  when: _jellyfin_repair_needed | bool

- name: Look up Jellyfin admin user row in SQLite before password repair
  ansible.builtin.shell: |
    python3 - <<'PY'
    import json
    import sqlite3

    db_path = {{ jellyfin_db_path | to_json }}
    username = {{ jellyfin_config_admin_user | upper | to_json }}

    conn = sqlite3.connect(db_path, timeout=30)
    cur = conn.cursor()
    cur.execute("SELECT COUNT(*) FROM Users")
    total_users = cur.fetchone()[0]
    cur.execute("SELECT COUNT(*) FROM Users WHERE NormalizedUsername = ?", (username,))
    matching_users = cur.fetchone()[0]
    conn.close()

    print(json.dumps({"total_users": total_users, "matching_users": matching_users}))
    PY
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  register: jellyfin_db_user_lookup
  changed_when: false
  when: _jellyfin_repair_needed | bool

- name: Set Jellyfin DB lookup facts
  ansible.builtin.set_fact:
    jellyfin_db_total_users: "{{ (jellyfin_db_user_lookup.stdout | from_json).total_users | int }}"
    jellyfin_db_matching_users: "{{ (jellyfin_db_user_lookup.stdout | from_json).matching_users | int }}"
  when: _jellyfin_repair_needed | bool

- name: Refuse DB password repair when setup never created the admin user
  ansible.builtin.assert:
    that:
      - jellyfin_db_matching_users > 0
    fail_msg: >-
      Database-backed Jellyfin password repair cannot continue because admin user '{{ jellyfin_config_admin_user }}'
      does not exist in {{ jellyfin_db_path }}.
      Total Jellyfin users in database: {{ jellyfin_db_total_users }}.
      This means first-time setup did not create the admin account, so the setup wizard recovery path must run before password repair.
  when: _jellyfin_repair_needed | bool

- name: Back up Jellyfin DB files before repair
  ansible.builtin.shell: |
    python3 - <<'PY'
    import pathlib
    import shutil

    db = pathlib.Path({{ jellyfin_db_path | to_json }})
    for suffix in ('', '-wal', '-shm'):
        src = pathlib.Path(str(db) + suffix)
        if src.exists():
            shutil.copy2(src, pathlib.Path(str(src) + '.ansible.bak'))
    print(db)
    PY
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  register: jellyfin_db_backup
  changed_when: false
  when: _jellyfin_repair_needed | bool

- name: Clear Jellyfin password and lockout state in SQLite
  ansible.builtin.shell: |
    python3 - <<'PY'
    import sqlite3

    db_path = {{ jellyfin_db_path | to_json }}
    username = {{ jellyfin_config_admin_user | upper | to_json }}

    conn = sqlite3.connect(db_path, timeout=30)
    cur = conn.cursor()
    cur.execute(
        "UPDATE Users SET Password = NULL, InvalidLoginAttemptCount = 0 WHERE NormalizedUsername = ?",
        (username,))
    user_rows = cur.rowcount
    cur.execute(
        "UPDATE Permissions SET Value = 0 WHERE Kind = 2 AND UserId IN (SELECT Id FROM Users WHERE NormalizedUsername = ?)",
        (username,))
    conn.commit()
    conn.close()
    print(user_rows)
    PY
  delegate_to: "{{ jellyfin_config_target_node }}"
  become: true
  register: jellyfin_db_reset
  changed_when: (_jellyfin_repair_needed | bool) and (jellyfin_db_reset.stdout | trim) != '0'
  when: _jellyfin_repair_needed | bool

- name: Verify Jellyfin admin row was updated in SQLite
  ansible.builtin.assert:
    that:
      - (jellyfin_db_reset.stdout | trim | int) > 0
    fail_msg: >-
      Database-backed Jellyfin password recovery could not find user '{{ jellyfin_config_admin_user }}'
      in {{ jellyfin_db_path }} even though the user row existed before the reset.
  when: _jellyfin_repair_needed | bool

- name: Authenticate with empty password after DB reset
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/AuthenticateByName"
    method: POST
    headers:
      X-Emby-Authorization: >-
        MediaBrowser Client="Ansible", Device="Homelab-Ansible",
        DeviceId="ansible-{{ inventory_hostname }}", Version="1.0.0"
      Content-Type: "application/json"
    body_format: json
    body:
      Username: "{{ jellyfin_config_admin_user }}"
      Pw: ""
    status_code: [200]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: empty_pw_auth_result
  no_log: true
  when: _jellyfin_repair_needed | bool

- name: Set Jellyfin password to vault value via authenticated API
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/Password"
    method: POST
    headers:
      X-Emby-Authorization: >-
        MediaBrowser Client="Ansible", Device="Homelab-Ansible",
        DeviceId="ansible-{{ inventory_hostname }}", Version="1.0.0",
        Token="{{ empty_pw_auth_result.json.AccessToken }}"
      Content-Type: "application/json"
    body_format: json
    body:
      CurrentPw: ""
      NewPw: "{{ jellyfin_config_admin_password }}"
    status_code: [204]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  no_log: true
  register: pw_change_result
  when: _jellyfin_repair_needed | bool

- name: Confirm password repair result
  ansible.builtin.debug:
    msg: "Password hash repaired successfully. Web UI login will now work with the vault password."
  when:
    - jellyfin_config_display_results | default(true)
    - _jellyfin_repair_needed | bool
