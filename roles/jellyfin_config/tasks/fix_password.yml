---
# Repair an empty password hash for the Jellyfin admin user.
#
# Root cause: upgrading Jellyfin across major versions (e.g., Swarm 10.7→10.9+)
# clears old SHA-256 password hashes that are incompatible with the new bcrypt
# storage. The user account survives in the database but PasswordHash.Parse("")
# throws ArgumentException, causing every web-UI login attempt to return HTTP 400.
#
# Detection: attempt auth via the current "Pw" path (plain-text, strict).
#   - HTTP 200 → hash is valid, nothing to do.
#   - HTTP 400 → hash is empty/corrupt, repair needed.
#
# Repair: authenticate via the legacy "Password" path (which Jellyfin accepts even
# for empty hashes to allow recovery), then POST a new password to write a proper
# bcrypt hash. After this task, both "Password" and "Pw" paths work normally.

- name: Set target Jellyfin URL
  ansible.builtin.set_fact:
    jellyfin_target_url: "{{ target_url | default('http://127.0.0.1:' + (jellyfin_config_web_port | string)) }}"

- name: Test admin login via Pw path (detects empty hash)
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/AuthenticateByName"
    method: POST
    headers:
      X-Emby-Authorization: >-
        MediaBrowser Client="Ansible", Device="Homelab-Ansible",
        DeviceId="ansible-{{ inventory_hostname }}", Version="1.0.0"
      Content-Type: "application/json"
    body_format: json
    body:
      Username: "{{ jellyfin_config_admin_user }}"
      Pw: "{{ jellyfin_config_admin_password }}"
    status_code: [200, 400, 401]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: pw_path_test
  become: false
  failed_when: false

- name: Debug password hash state
  ansible.builtin.debug:
    msg: >-
      Password hash check: HTTP {{ pw_path_test.status }}.
      {{
        'Hash is valid — no repair needed.' if pw_path_test.status == 200 else
        'Empty/corrupt hash detected — will repair.' if pw_path_test.status == 400 else
        'Wrong credentials (HTTP 401) — check jellyfin_config_admin_password in vault.'
      }}
  when: jellyfin_config_display_results | default(true)

- name: Authenticate via legacy Password path to obtain repair token
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/AuthenticateByName"
    method: POST
    headers:
      X-Emby-Authorization: >-
        MediaBrowser Client="Ansible", Device="Homelab-Ansible",
        DeviceId="ansible-{{ inventory_hostname }}", Version="1.0.0"
      Content-Type: "application/json"
    body_format: json
    body:
      Username: "{{ jellyfin_config_admin_user }}"
      Password: "{{ jellyfin_config_admin_password }}"
    status_code: [200]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: repair_auth
  become: false
  when: pw_path_test.status == 400
  no_log: true

- name: Get admin user ID
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/Me"
    method: GET
    headers:
      X-Emby-Token: "{{ repair_auth.json.AccessToken }}"
    status_code: [200]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  register: repair_user_info
  become: false
  when: pw_path_test.status == 400

- name: Write proper bcrypt hash by resetting password
  ansible.builtin.uri:
    url: "{{ jellyfin_target_url }}/Users/{{ repair_user_info.json.Id }}/Password"
    method: POST
    headers:
      X-Emby-Token: "{{ repair_auth.json.AccessToken }}"
      Content-Type: "application/json"
    body_format: json
    body:
      CurrentPw: ""
      NewPw: "{{ jellyfin_config_admin_password }}"
      ResetPassword: true
    status_code: [200, 204]
    validate_certs: "{{ jellyfin_config_validate_certs }}"
  become: false
  when: pw_path_test.status == 400
  no_log: true
  register: password_reset_result

- name: Confirm password repair result
  ansible.builtin.debug:
    msg: >-
      {{
        'Password hash repaired successfully. Web UI login will now work.' if (password_reset_result is defined and password_reset_result is changed)
        else 'Password hash was already valid — no change.'
      }}
  when: jellyfin_config_display_results | default(true)
