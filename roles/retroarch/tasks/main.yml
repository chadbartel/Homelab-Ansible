---
# RetroArch Role - Main Tasks
# Deploys RetroArch emulator frontend via Docker Compose V2

- name: Display RetroArch role information
  ansible.builtin.debug:
    msg: |
      RetroArch Emulator Frontend
      Container: {{ retroarch_container_name }}
      HTTP Port: {{ retroarch_http_port }}
      HTTPS Port: {{ retroarch_https_port }}
      GPU Acceleration: {{ retroarch_gpu_enabled }}
      Network: {{ retroarch_network_name }}
      NPM Domain: {{ retroarch_npm_domain }}

- name: Ensure ROMs directory exists on host
  ansible.builtin.file:
    path: "{{ retroarch_roms_source }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ inventory_hostname }}"

- name: Create RetroArch docker volumes for config
  community.docker.docker_volume:
    name: "{{ retroarch_config_volume_name }}"
    state: present
    driver: local
  delegate_to: "{{ inventory_hostname }}"

- name: Create RetroArch compose project directory
  ansible.builtin.file:
    path: "/opt/retroarch"
    state: directory
    mode: "0755"
  delegate_to: "{{ inventory_hostname }}"

- name: Generate RetroArch Compose file from template
  ansible.builtin.template:
    src: retroarch-compose.yml.j2
    dest: "/opt/retroarch/docker-compose.yml"
    mode: "0644"
  delegate_to: "{{ inventory_hostname }}"
  register: retroarch_compose_generated

- name: Pull RetroArch image and deploy via docker compose
  community.docker.docker_compose_v2:
    project_src: "/opt/retroarch"
    state: present
    pull: always  # Always pull latest image to ensure updates
  delegate_to: "{{ inventory_hostname }}"
  register: retroarch_compose_result

- name: Display compose deployment result
  ansible.builtin.debug:
    msg: |
      RetroArch Compose Deployment:
      {% if retroarch_compose_result.changed %}
      ✅ Changes applied (container started or updated)
      {% else %}
      ℹ️  No changes (service already in desired state)
      {% endif %}

- name: Wait for RetroArch web UI to become ready
  ansible.builtin.include_tasks: wait_for_retroarch.yml

- name: Register RetroArch deployment handler
  ansible.builtin.set_fact:
    retroarch_deployed: true
  notify: RetroArch deployment complete

- name: Display RetroArch access information
  ansible.builtin.debug:
    msg: |
      ✓ RetroArch successfully deployed
      
      Direct Access (LAN):
        http://192.168.1.17:{{ retroarch_http_port }}
        https://192.168.1.17:{{ retroarch_https_port }}
      
      Via Nginx Proxy Manager:
        {{ retroarch_npm_domain }}
        (requires NPM configuration - see QUICK_START.md)
      
      Container Details:
        Name: {{ retroarch_container_name }}
        GPU: {{ retroarch_gpu_enabled }}
        Config Volume: {{ retroarch_config_volume_name }}
        ROMs Location: {{ retroarch_roms_source }}
      
      First Launch:
        With NVIDIA GPU, you may need to right-click desktop 
        and re-launch RetroArch on first run.
