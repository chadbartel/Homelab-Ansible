---
# Default variables for jellyctl role

# Jellyfin server URL
jellyctl_url: "http://127.0.0.1:8096"

# Jellyfin API token (should be overridden in vars or vault)
jellyctl_token: ""

# Path to jellyctl binary (leave empty for automatic detection)
jellyctl_binary_path: ""

# Command to execute (system, user, library, key, task, activity)
jellyctl_command: ""

# Subcommand to execute (depends on command)
jellyctl_subcommand: ""

# Arguments for the command (as a list)
jellyctl_args: []

# Additional flags (as a dictionary)
jellyctl_flags: {}

# Whether to output JSON (--json flag)
jellyctl_output_json: false

# Fail if jellyctl is not found
jellyctl_fail_on_missing: true
