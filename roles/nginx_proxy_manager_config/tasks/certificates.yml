---
# Ensure a Let's Encrypt SSL certificate exists in NPM for the homelab domain.
#
# Idempotent: on first run it requests a wildcard cert via NPM's built-in
# DNS-01 challenge (DuckDNS); on subsequent runs it finds the existing cert
# and reuses its ID. NPM handles renewal automatically.
#
# Output fact: npm_ssl_cert_id  (integer cert ID to use on proxy hosts)
#
# Required vars:
#   npm_config_cert_domain   - base domain (e.g. "chadbartel.duckdns.org")
#   npm_config_duckdns_token - DuckDNS API token (from vault_duckdns_token)

- name: Authenticate with NPM API for certificate management
  ansible.builtin.uri:
    url: "http://{{ hostvars[npm_config_target_node]['ansible_host'] }}:{{ npm_config_web_port }}/api/tokens"
    method: POST
    body_format: json
    body:
      identity: "{{ npm_config_admin_email }}"
      secret: "{{ npm_config_admin_password }}"
    return_content: yes
    status_code: 200
  register: npm_cert_auth
  retries: 5
  delay: 5
  until: npm_cert_auth.status == 200
  become: false
  no_log: true

- name: Set NPM auth token for certificate tasks
  ansible.builtin.set_fact:
    npm_auth_token: "{{ npm_cert_auth.json.token }}"
  no_log: true

- name: List existing SSL certificates from NPM
  ansible.builtin.uri:
    url: "http://{{ hostvars[npm_config_target_node]['ansible_host'] }}:{{ npm_config_web_port }}/api/nginx/certificates"
    method: GET
    headers:
      Authorization: "Bearer {{ npm_auth_token }}"
    return_content: yes
    status_code: 200
  register: npm_existing_certs
  become: false

# Search for a Let's Encrypt cert whose domain_names list covers the wildcard.
# Excludes self-signed certs (provider: other) to avoid reusing an untrusted cert.
- name: Find existing Let's Encrypt cert covering the homelab domain
  ansible.builtin.set_fact:
    npm_ssl_cert_id: "{{ item.id | int }}"
  loop: "{{ npm_existing_certs.json }}"
  when:
    - item.domain_names is defined
    - item.provider == 'letsencrypt'
    - >-
      ('*.' + npm_config_cert_domain) in item.domain_names
      or npm_config_cert_domain in item.domain_names
  no_log: true

- name: Display cert discovery result
  ansible.builtin.debug:
    msg: >-
      {{
        "Found existing Let's Encrypt cert (ID " + (npm_ssl_cert_id | string) + ") for " + npm_config_cert_domain
        if npm_ssl_cert_id is defined
        else "No Let's Encrypt cert found for " + npm_config_cert_domain + " — requesting via DNS-01 challenge"
      }}

# ── Let's Encrypt DNS-01 provisioning (runs only when no LE cert was found) ──
# NPM delegates the ACME flow to certbot inside the container; this call
# blocks until certbot completes or the timeout is reached.

- name: Request Let's Encrypt wildcard certificate via DNS-01 (DuckDNS)
  ansible.builtin.uri:
    url: "http://{{ hostvars[npm_config_target_node]['ansible_host'] }}:{{ npm_config_web_port }}/api/nginx/certificates"
    method: POST
    headers:
      Authorization: "Bearer {{ npm_auth_token }}"
    body_format: json
    body:
      provider: "letsencrypt"
      nice_name: "letsencrypt-wildcard-{{ npm_config_cert_domain }}"
      domain_names:
        - "*.{{ npm_config_cert_domain }}"
        - "{{ npm_config_cert_domain }}"
      meta:
        dns_challenge: true
        dns_provider: "duckdns"
        dns_provider_credentials: "dns_duckdns_token={{ npm_config_duckdns_token }}"
        propagation_seconds: 0
    return_content: yes
    status_code: [200, 201]
    timeout: 180
  register: npm_new_cert
  become: false
  no_log: false
  when: npm_ssl_cert_id is not defined

# Poll until expires_on is populated, which confirms certbot finished and the
# cert is stored. Covers cases where NPM returns before certbot fully commits.
- name: Wait for Let's Encrypt certificate to be issued
  ansible.builtin.uri:
    url: "http://{{ hostvars[npm_config_target_node]['ansible_host'] }}:{{ npm_config_web_port }}/api/nginx/certificates/{{ npm_new_cert.json.id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ npm_auth_token }}"
    return_content: yes
    status_code: 200
  register: npm_cert_status
  retries: 18
  delay: 10
  until: >-
    npm_cert_status.json.expires_on is defined
    and npm_cert_status.json.expires_on != ''
    and npm_cert_status.json.expires_on != None
  become: false
  when: npm_ssl_cert_id is not defined

- name: Set cert ID from newly provisioned Let's Encrypt certificate
  ansible.builtin.set_fact:
    npm_ssl_cert_id: "{{ npm_new_cert.json.id | int }}"
  when: npm_ssl_cert_id is not defined

- name: Display final SSL certificate status
  ansible.builtin.debug:
    msg: "Let's Encrypt cert ID {{ npm_ssl_cert_id }} will be applied to all proxy hosts for {{ npm_config_cert_domain }}"
