---
# Monolith group variables for consolidated single-host deployment

# Media and data drives mounted locally on monolith.
# Use stable by-id paths so device ordering changes do not break mounts.
ssd_media_drives:
  - device: "/dev/disk/by-id/usb-Samsung_PSSD_T7_Shield_S6SFNS0Y906542L-0:0-part2"
    format: false
    mount_path: "/mnt/ssd_media"
  - device: "/dev/disk/by-id/usb-StoreJet_Transcend_S2S6J9CCA11081-0:0-part1"
    format: false
    mount_path: "/mnt/ssd_media2"

# Secondary NVMe inventory for migration planning.
# The current device has no partition table or filesystem yet, so bootstrap will
# create the mountpoint and skip mounting until the drive is initialized.
nvme_data_drives:
  - device: "/dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S7L9NJ0L314443P"
    format: false
    mount_path: "/mnt/nvme_secondary"

# Shared host storage exposed to all service containers.
# These mounts provide cross-service access to media/data paths.
shared_storage_mounts:
  - source: "/mnt/ssd_media"
    target: "/mnt/ssd_media"
    read_only: false
  - source: "/mnt/ssd_media2"
    target: "/mnt/ssd_media2"
    read_only: false
  - source: "/mnt/nvme_secondary"
    target: "/mnt/nvme_secondary"
    read_only: false

# Nginx Proxy Manager configuration (monolith acts as both upstream server and proxy)
proxy_hosts:
  # Pi-hole: use container name on homelab-bridge network
  - domain: "{{ pihole_container_name }}.{{ local_domain }}"
    host: "pihole"  # Container DNS name instead of IP
    port: 80  # Internal port (Pi-hole web UI)
    scheme: "http"

  # Portainer: use container name on homelab-bridge network
  - domain: "{{ portainer_container_name }}.{{ local_domain }}"
    host: "portainer"
    port: 9000  # Internal Portainer web UI port (HTTP)
    scheme: "http"

  # NPM itself: use container name on homelab-bridge network
  - domain: "{{ nginx_proxy_container_name }}.{{ local_domain }}"
    host: "proxy"
    port: 81  # Internal NPM web interface port
    scheme: "http"

  # Jellyfin: use container name on homelab-bridge network
  - domain: "{{ jellyfin_container_name }}.{{ local_domain }}"
    host: "jellyfin"
    port: 8096  # Internal Jellyfin port
    scheme: "http"
    block_exploits: false  # Jellyfin mobile app sends non-browser API requests that trigger exploit blocks

  # Bazarr: use container name on homelab-bridge network
  - domain: "{{ bazarr_container_name }}.{{ local_domain }}"
    host: "bazarr"
    port: 6767  # Internal Bazarr port
    scheme: "http"

  # Ollama: use container name on homelab-bridge network
  - domain: "{{ ollama_container_name }}.{{ local_domain }}"
    host: "ollama"
    port: 11434  # Internal Ollama API port
    scheme: "http"

  # Open WebUI: public domain chat.chadbartel.duckdns.org (with Internal Only access list)
  - domain: "{{ open_webui_proxy_domain }}"
    host: "open-webui"
    port: 8080  # Internal Open WebUI port
    scheme: "http"
    access_list_id: "{{ open_webui_access_list_id | default(0) }}"  # Will be populated with "Internal Only" access list ID

  # Dispatcharr: IPTV/VOD platform on homelab-bridge network
  - domain: "dispatcharr.chadbartel.duckdns.org"
    host: "dispatcharr-web"
    port: 9191  # Internal Dispatcharr port
    scheme: "http"
    block_exploits: true

  # RetroArch: Emulator frontend with KasmVNC streaming (GPU-accelerated)
  - domain: "{{ retroarch_container_name }}.{{ local_domain }}"
    host: "{{ retroarch_container_name }}"  # Container name on bridge network (NOT IP)
    port: 3000  # KasmVNC HTTP port
    scheme: "http"
    websocket_upgrade: true  # REQUIRED: KasmVNC streams video/audio via WebSocket protocol
    ssl_forced: true  # Force HTTPS redirect via Let's Encrypt wildcard cert
    http2_support: true  # Enable HTTP/2 for improved performance
    block_exploits: true

  # Audiobookshelf: Audiobook/ebook management on homelab-bridge network
  - domain: "books.{{ local_domain }}"
    host: "{{ audiobookshelf_container_name }}"
    port: 80  # Internal Audiobookshelf port
    scheme: "http"
    websocket_upgrade: true  # REQUIRED: Library sync uses WebSocket protocol
    ssl_forced: true  # Force HTTPS redirect via Let's Encrypt wildcard cert
    http2_support: true  # Enable HTTP/2 for improved performance
    block_exploits: true

# Directories to create/prepare during bootstrap phase (before containers start)
# These ensure state directories exist for rsync migration
bootstrap_state_dirs:
  - path: "/opt/pihole/etc-pihole"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/opt/pihole"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/opt/npm/data"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/opt/npm/letsencrypt"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/opt/jellyfin/config"
    owner: "1000"
    group: "1000"
    mode: "0755"
  - path: "/opt/bazarr/config"
    owner: "1000"
    group: "1000"
    mode: "0755"
  - path: "/opt/ollama/data"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/opt/open-webui/data"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "/opt/audiobookshelf/config"
    owner: "1000"
    group: "1000"
    mode: "0755"
  - path: "/mnt/ssd_media"
    owner: "1000"
    group: "1000"
    mode: "0755"
  - path: "/mnt/ssd_media2"
    owner: "1000"
    group: "1000"
    mode: "0755"
  - path: "/mnt/nvme_secondary"
    owner: "1000"
    group: "1000"
    mode: "0755"

# Tailscale IP forwarding (required for Tailscale subnet router / exit node capability)
enable_ipv4_forwarding: true
enable_ipv6_forwarding: false  # Set to true if running Tailscale subnet router with IPv6

# Jellyfin GPU configuration (NVIDIA RTX 2070 SUPER via Compose V2 device reservations)
jellyfin_gpu_enabled: true  # NVIDIA driver installed and verified with Docker GPU access working
jellyfin_gpu_device_count: 1
jellyfin_gpu_capabilities: ["gpu", "video.utility"]

# Ollama GPU configuration (NVIDIA RTX 2070 SUPER via Compose V2 device reservations)
ollama_gpu_enabled: true  # NVIDIA driver installed and verified with Docker GPU access working
ollama_gpu_device_count: 1
ollama_gpu_capabilities: ["gpu"]

# ============================================================================
# Dispatcharr Configuration
# CRITICAL: These values MUST be set to deterministic values to maintain
# database connectivity across playbook runs. Random generation causes
# PostgreSQL password mismatches and 502 errors.
# ============================================================================
dispatcharr_postgres_password: "{{ vault_dispatcharr_postgres_password | default('dispatcharr_secure_db_password_2026') }}"
dispatcharr_django_secret_key: "{{ vault_dispatcharr_django_secret_key | default('dispatcharr_django_secret_key_change_this_in_vault_12345') }}"
dispatcharr_enable_gpu: true  # RTX 2070 SUPER passthrough enabled
dispatcharr_celery_concurrency: 4
