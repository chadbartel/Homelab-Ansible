---
# Global variables for homelab deployment

# Admin user configuration
admin_user: "{{ vault_admin_username | default('admin') }}"
admin_email: "me@chadbartel.com"
admin_password: "{{ vault_admin_password }}"
admin_ssh_key_public: "{{ vault_admin_ssh_key_public }}"

# Ansible privilege escalation configuration
# Reuse vault admin credentials for sudo to avoid duplicate prompts.
ansible_become: true
ansible_become_method: "sudo"
ansible_become_user: "root"
ansible_become_password: "{{ vault_admin_password }}"

# Docker user configuration
# Users to add to the docker group (allows running Docker commands without sudo)
# If not specified, defaults to admin_user only
docker_users:
  - "{{ admin_user }}"

# Bootstrap configuration
ansible_version: "2.18.6"
x86_image_link: "https://mirror.pnl.gov/releases/noble/ubuntu-24.04.2-live-server-amd64.iso"
arm_image_link: "https://downloads.raspberrypi.org/raspios_lite_arm64/archive/2025-05-13-08:03/"
dietpi_image_link: "https://dietpi.com/downloads/images/DietPi_RPi234-ARMv8-Bookworm.img.xz"
stack_deployer_backend: "compose"  # Default backend for stack deployment (can be overridden at runtime)

# Network configuration (single monolith)
homelab_network: "192.168.1.0/24"
monolith_ip: "192.168.1.17"
gateway_ip: "192.168.1.1"
local_domain: "chadbartel.duckdns.org"

# Service host ports
proxy_host_port: 8181
pihole_host_port: 8081

# Legacy compatibility alias retained for templates/tasks still being migrated
manager_node_ip: "{{ monolith_ip }}"

# Service passwords (should be stored in vault)
portainer_admin_password: "{{ vault_portainer_admin_password }}"
npm_admin_password: "{{ vault_npm_admin_password }}"

# Portainer configuration
portainer_host_port: 9443
portainer_agent_secret: "{{ vault_portainer_agent_secret }}"

# Jellyfin configuration
jellyfin_user1_password: "{{ vault_jellyfin_user1_password }}"
jellyfin_enable_hw_accel: false  # Hardware acceleration via NVIDIA GPU; enabled via Compose reservations
jellyfin_host: monolith  # Ansible inventory hostname where Jellyfin runs
jellyfin_image: "jellyfin/jellyfin:10"  # Official Jellyfin image
jellyfin_container_name: "jellyfin"
jellyfin_host_port: 8096
jellyfin_memory_limit: "4GB"  # Container memory limit
jellyfin_media_mount_path: "/mnt/ssd_media"  # Host path where media is stored
jellyfin_container_media_path: "/media"  # Path inside container where media is mounted
jellyfin_external_url: "http://{{ jellyfin_container_name }}.{{ local_domain }}"  # External URL via proxy
jellyfin_epg_image: "alpine:3.23"
jellyfin_epg_schedule: "0 1 * * *"  # Cron format: 1:00 AM daily
jellyfin_config_force_password_reset: true  # Force password reset on first login for security

# EPG (Electronic Program Guide) channel guide files
jellyfin_epg_files:
  - url: "https://epgshare01.online/epgshare01/epg_ripper_US2.xml.gz"
    filename: "epg_ripper_US2.xml.gz"
  - url: "https://epgshare01.online/epgshare01/epg_ripper_US_LOCALS1.xml.gz"
    filename: "epg_ripper_US_LOCALS1.xml.gz"
  - url: "https://epgshare01.online/epgshare01/epg_ripper_US_SPORTS1.xml.gz"
    filename: "epg_ripper_US_SPORTS1.xml.gz"

# IPTV playlist sources for LiveTV tuner configuration
jellyfin_iptv_playlists:
  - url: "https://iptv-org.github.io/iptv/countries/us.m3u"
    name: "All English IPTV Channels"

# Jellyfin Config Role Variables
jellyfin_config_service_name: "jellyfin-stack_jellyfin"
jellyfin_config_target_node: "monolith"
jellyfin_config_web_port: 8096
jellyfin_config_admin_user: "{{ vault_admin_username | default('admin') }}"
jellyfin_config_admin_password: "{{ vault_jellyfin_user1_password }}"
jellyfin_config_api_key_app_name: "ansible_automation"
jellyfin_config_libraries:
  - name: "Music"
    type: "music"
    paths:
      - "/media/music"
    refresh_on_create: true
  - name: "Movies"
    type: "movies"
    paths:
      - "/media/movies"
    refresh_on_create: true
  - name: "Television"
    type: "tvshows"
    paths:
      - "/media/television"
    refresh_on_create: true

# NGINX Proxy Manager Config Role Variables
npm_image: "jc21/nginx-proxy-manager:2"
npm_service_name: "npm-stack_npm"
npm_target_node: "monolith"
npm_container_name: "npm-stack-npm-1"  # Docker Compose v2 name: project-service-instance

# Pi-hole configuration
pihole_image: "pihole/pihole:2026.04.1"
pihole_config_path: "/opt/pihole/etc-pihole"
pihole_web_password: "{{ vault_pihole_admin_password }}"
block_lists: "https://v.firebog.net/hosts/lists.php?type=tick"
pihole_data_path: "/opt/pihole"
pihole_web_port: 8081  # Port for Pi-hole web interface
pihole_dns_port: 80  # Port for Pi-hole DNS service
pihole_target_host: monolith  # Ansible inventory hostname where Pi-hole runs
pihole_shm_size: 134217728  # /dev/shm size in bytes (128MB); FTL exhausted the default 67MB

# Pi-hole Config Role Variables
pihole_config_service_name: "pihole-stack_pihole"
pihole_config_target_node: "monolith"

# Custom DNS entries for local services
pihole_config_custom_dns_entries:
  - ip: "{{ monolith_ip }}"
    hostname: "{{ pihole_container_name }}.{{ local_domain }}"
  - ip: "{{ monolith_ip }}"
    hostname: "{{ portainer_container_name }}.{{ local_domain }}"
  - ip: "{{ monolith_ip }}"
    hostname: "{{ nginx_proxy_container_name }}.{{ local_domain }}"
  - ip: "{{ monolith_ip }}"
    hostname: "{{ jellyfin_container_name }}.{{ local_domain }}"

# Dnsmasq performance tuning
pihole_config_dnsmasq_settings:
  - "dns-forward-max=300"

# Pi-hole rate limiting configuration (prevents "Client X has been rate-limited" errors)
pihole_rate_limit_enabled: true
pihole_rate_limit_count: 2000  # Queries per interval (10x default of 1000)
pihole_rate_limit_interval: 60  # Seconds

# Pi-hole upstream DNS servers (prevents query failures)
pihole_upstream_dns_servers:
  - "1.1.1.1"  # Cloudflare primary
  - "8.8.8.8"  # Google DNS fallback

# Pi-hole DNS listening mode (security hardening)
pihole_dns_listening_mode: "all"  # Listen on all interfaces to accept queries from LAN clients and router

# Note: pihole_config_adlists uses defaults from role (roles/pihole_config/defaults/main.yml)
# Override here if needed:
# pihole_config_adlists:
#   - url: "https://example.com/custom-list.txt"
#     comment: "Custom List"
#     enabled: true

# Docker Stacks Configuration
portainer_stacks:
  - name: npm-stack
    compose_template: npm-compose.yml.j2
    target_host: monolith
  - name: pihole-stack
    compose_template: pihole-compose.yml.j2
    target_host: monolith
  - name: jellyfin-stack
    compose_template: jellyfin-compose.yml.j2
    target_host: monolith

# Media: Local mount at /mnt/ssd_media (via /etc/fstab UUID entries)
nfs_storage_host_ip: "192.168.1.12"
nfs_export_path: "/mnt/ssd_media"
nfs_export_network: "192.168.1.0/24"
nfs_export_options: "rw,sync,no_subtree_check,all_squash,anonuid=1000,anongid=1000"
nfs_client_mount_path: "/mnt/ssd_media"
nfs_client_options: "rw,soft,intr,noatime,timeo=14,_netdev"
pihole_container_name: "pihole"
portainer_container_name: "portainer"
nginx_proxy_container_name: "proxy"

# Headscale (self-hosted Tailscale control plane)
headscale_container_name: "headscale"
headscale_image: "ghcr.io/juanfont/headscale:latest"
headscale_host_port: 8080
headscale_container_port: 8080

# Miscellaneous
timezone: "America/Los_Angeles"

# Python virtual environment configuration
python_version: "3.11"  # Python version to use
python_venv_name: "homelab-ansible"  # Name of the virtual environment
python_venv_path: "/opt/{{ python_venv_name }}"  # Path to create the venv
python_packages:
  - docker  # Python Docker SDK
  - requests  # Often needed by Ansible modules
  - urllib3  # HTTP library
