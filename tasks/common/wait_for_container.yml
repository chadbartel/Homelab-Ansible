---
# Common task: Wait for a container to become ready
# Polls container port until it responds
#
# Expected variables:
#   - wait_host: Host IP or hostname to poll
#   - wait_port: Port number to test
#   - wait_timeout: Maximum seconds to wait (default: 120)
#   - wait_delay: Seconds between retries (default: 5)

- name: Wait for container port to become available
  ansible.builtin.wait_for:
    host: "{{ wait_host }}"
    port: "{{ wait_port }}"
    timeout: "{{ wait_timeout | default(120) }}"
    delay: "{{ wait_delay | default(5) }}"
  register: wait_for_result
