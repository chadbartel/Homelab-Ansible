---
# Prepare a single SSD media drive on Storage Host (lenovo_server).
# Called via loop from prepare_ssd_media.yml and main.yml.
# Loop variable: ssd_drive (keys: device, format, mount_path)
# Set device to empty string to skip that drive's setup.

- name: Create SSD media mount directory
  ansible.builtin.file:
    path: "{{ ssd_drive.mount_path }}"
    state: directory
    mode: "0755"
  when: ssd_drive.device | length > 0

- name: Format SSD media partition as ext4 (destructive)
  community.general.filesystem:
    fstype: ext4
    dev: "{{ ssd_drive.device }}"
  when:
    - ssd_drive.device | length > 0
    - ssd_drive.format | default(false) | bool

- name: Get UUID of SSD media partition
  ansible.builtin.command:
    cmd: blkid -s UUID -o value "{{ ssd_drive.device }}"
  register: ssd_media_uuid_result
  changed_when: false
  when: ssd_drive.device | length > 0

- name: Get filesystem type of SSD media partition
  ansible.builtin.command:
    cmd: blkid -s TYPE -o value "{{ ssd_drive.device }}"
  register: ssd_media_fstype_result
  changed_when: false
  when: ssd_drive.device | length > 0

- name: Mount SSD media and add to fstab (by UUID)
  ansible.posix.mount:
    path: "{{ ssd_drive.mount_path }}"
    src: "UUID={{ ssd_media_uuid_result.stdout }}"
    fstype: "{{ ssd_media_fstype_result.stdout }}"
    state: mounted
    opts: defaults
  when:
    - ssd_drive.device | length > 0
    - ssd_media_uuid_result.stdout is defined
    - ssd_media_uuid_result.stdout | length > 0
    - ssd_media_fstype_result.stdout is defined
    - ssd_media_fstype_result.stdout | length > 0
