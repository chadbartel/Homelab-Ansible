---
# Initial system setup tasks
- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - vim
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - python3-pip
      - python3-venv
      - python3-dev
    state: present

- name: Create Python virtual environment directory
  ansible.builtin.file:
    path: "{{ python_venv_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: "python3 -m venv {{ python_venv_path }}"
    creates: "{{ python_venv_path }}/bin/activate"
  register: venv_created

- name: Upgrade pip in virtual environment
  ansible.builtin.pip:
    name: pip
    state: latest
    virtualenv: "{{ python_venv_path }}"
    virtualenv_command: "python3 -m venv"

- name: Install Python packages in virtual environment
  ansible.builtin.pip:
    name: "{{ python_packages }}"
    state: present
    virtualenv: "{{ python_venv_path }}"
    virtualenv_command: "python3 -m venv"

- name: Create symbolic link for system-wide access to venv python
  ansible.builtin.file:
    src: "{{ python_venv_path }}/bin/python"
    dest: "/usr/local/bin/ansible-python"
    state: link
    force: true

# Configure IP forwarding for Tailscale and other networking features
- name: Enable persistent IPv4 forwarding for Tailscale
  ansible.builtin.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true

- name: Enable persistent IPv6 forwarding (if needed for Tailscale exit node)
  ansible.builtin.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: '{{ "1" if enable_ipv6_forwarding | default(false) else "0" }}'
    sysctl_set: true
    state: present
    reload: true

- name: Display IP forwarding configuration
  ansible.builtin.debug:
    msg: |
      ✅ IP forwarding configured for Tailscale:
      IPv4 forwarding: enabled
      IPv6 forwarding: {{ "enabled" if enable_ipv6_forwarding | default(false) else "disabled" }}

- name: Display virtual environment info
  ansible.builtin.debug:
    msg: |
      ✅ Python virtual environment created:
      Path: {{ python_venv_path }}
      Python: {{ python_venv_path }}/bin/python
      Pip: {{ python_venv_path }}/bin/pip
      Packages installed: {{ python_packages | join(', ') }}

- name: Create admin user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    comment: "Admin User"
    groups: sudo
    state: present
    shell: /bin/bash
    password: "{{ admin_password | password_hash('sha512') }}"
  when: 
    - ansible_user != admin_user
    - admin_password | length > 0

- name: Set up SSH key authentication
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    state: present
    key: "{{ admin_ssh_key_public }}"
  when: admin_ssh_key_public | length > 0

- name: Configure SSH security
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    backup: true
  loop:
    - regexp: '^#?PasswordAuthentication'
      line: "PasswordAuthentication no"
    - regexp: '^#?PermitRootLogin'
      line: "PermitRootLogin no"
  notify: restart ssh

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Create Pi-hole data directory
  ansible.builtin.file:
    path: "{{ pihole_data_path }}"
    state: directory
    mode: '0755'
    owner: root
    group: root