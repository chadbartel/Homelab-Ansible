---
# Post-setup configuration tasks
- name: Display deployment summary
  ansible.builtin.debug:
    msg: |
      🎉 Homelab deployment completed successfully!
      
      Services available:
      - Portainer: https://{{ ansible_host }}:{{ portainer_host_port }}
      - Pi-hole: http://{{ ansible_host }}:{{ pihole_host_port }}/admin
      - NPM: http://{{ ansible_host }}:{{ proxy_host_port }}
      - Jellyfin: http://{{ jellyfin_container_name }}.{{ local_domain }} (via NPM)
      - Bazarr: http://{{ bazarr_container_name }}.{{ local_domain }} (via NPM)
      
      Next steps:
      1. Configure services through their web interfaces
      2. Set up reverse proxy entries in NPM
      3. Configure client devices to use Pi-hole DNS

- name: Run post-setup tasks for Pi-hole
  ansible.builtin.include_tasks: tasks/post_setup_pihole.yml
  tags: ["post_setup", "pihole", "configure"]

- name: Run post-setup tasks for Nginx Proxy Manager
  ansible.builtin.include_tasks: tasks/post_setup_npm.yml
  tags: ["post_setup", "npm", "configure"]

- name: Run post-setup tasks for Jellyfin
  ansible.builtin.include_tasks: tasks/post_setup_jellyfin.yml
  tags: ["post_setup", "jellyfin", "configure"]

- name: Run post-setup tasks for Open WebUI
  ansible.builtin.include_tasks: tasks/post_setup_open_webui.yml
  tags: ["post_setup", "open_webui", "configure"]

- name: Run post-setup cleanup tasks
  ansible.builtin.include_tasks: tasks/cleanup.yml
  tags: ["post_setup", "cleanup"]