---
# Main playbook for monolith-only deployment
# Split into two execution modes: bootstrap (host prep) and deploy (stack startup)
# 
# Recommended execution:
#   ansible-playbook main.yml --tags bootstrap
#   [manual rsync of persistent state here]
#   ansible-playbook main.yml --tags deploy

- name: Bootstrap monolith host (phase 1/2 - no container startup)
  hosts: monolith
  gather_facts: false
  become: true
  vars_files:
    - vars.yml
    - vault.yml
  handlers:
    - name: restart ssh
      ansible.builtin.systemd_service:
        name: ssh
        state: restarted

    - name: restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted
  tasks:
    - name: Gather facts without privilege escalation
      ansible.builtin.setup:
      become: false
      tags: ["bootstrap", "setup"]

    - name: Clean up any corrupted APT sources from failed previous runs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/nvidia-container-toolkit.list
        - /etc/apt/sources.list.d/docker.list
      tags: ["bootstrap", "setup"]

    - name: Run initial setup tasks (sysctl, networking, etc.)
      ansible.builtin.include_tasks: tasks/initial_setup.yml
      tags: ["bootstrap", "setup"]

    - name: Install and configure Docker + python3-docker + NVIDIA toolkit
      ansible.builtin.include_tasks: tasks/docker.yml
      tags: ["bootstrap", "docker"]

    - name: Verify Docker service is running and healthy
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      register: docker_service_status
      tags: ["bootstrap", "docker"]

    - name: Wait for Docker socket to be available
      ansible.builtin.wait_for:
        path: /var/run/docker.sock
        timeout: 30
      tags: ["bootstrap", "docker"]

    - name: Test Docker daemon connectivity
      ansible.builtin.command:
        cmd: docker info
      register: docker_info_test
      changed_when: false
      retries: 3
      delay: 5
      tags: ["bootstrap", "docker"]

    - name: Display Docker status
      ansible.builtin.debug:
        msg: |
          Docker status on {{ inventory_hostname }}:
          Service: {{ 'Running' if docker_service_status.status.ActiveState == 'active' else 'Failed' }}
          Socket: Available
          Daemon: Connected
          Compose: Available
          Python3-docker: Installed
          NVIDIA Toolkit: Installed (if GPU present)
      tags: ["bootstrap", "docker"]

    - name: Install and configure native Tailscale (exit node + subnet router)
      ansible.builtin.include_role:
        name: tailscale
      vars:
        tailscale_advertise_routes: "192.168.1.0/24"
        tailscale_advertise_exit_node: true
      tags: ["bootstrap", "tailscale"]

    - name: Prepare SSD media drives (mount locally via UUID)
      ansible.builtin.include_tasks: tasks/ssd_media_drive.yml
      loop: "{{ ssd_media_drives | default([]) }}"
      loop_control:
        loop_var: ssd_drive
      tags: ["bootstrap", "storage"]

    - name: Prepare additional NVMe data drives (mount when initialized)
      ansible.builtin.include_tasks: tasks/ssd_media_drive.yml
      loop: "{{ nvme_data_drives | default([]) }}"
      loop_control:
        loop_var: ssd_drive
      tags: ["bootstrap", "storage"]

    - name: Prepare persistent state directories for application migration
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode | default('0755') }}"
      loop: "{{ bootstrap_state_dirs | default([]) }}"
      tags: ["bootstrap", "storage", "prepare"]

    - name: Prepare Jellyfin volume directories with correct ownership
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
        recurse: true
      loop:
        - "/var/lib/docker/volumes/jellyfin-stack_jellyfin_config/_data"
        - "/var/lib/docker/volumes/jellyfin-stack_jellyfin_cache/_data"
      tags: ["bootstrap", "jellyfin", "volumes"]

    - name: Prepare Bazarr volume directories with correct ownership
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
        recurse: true
      loop:
        - "/var/lib/docker/volumes/bazarr-stack_bazarr_config/_data"
      tags: ["bootstrap", "bazarr", "volumes"]

    - name: Disable systemd-resolved stub listener so Pi-hole can bind port 53
      ansible.builtin.include_tasks: tasks/disable_resolved_stub.yml
      tags: ["bootstrap", "pihole", "dns"]

    - name: Display bootstrap readiness
      ansible.builtin.debug:
        msg: |
          ✅ Bootstrap phase complete!
          
          Next steps:
          1. Perform manual rsync of persistent state to /mnt/ssd_media and state directories
          2. Ensure NPM data and letsencrypt folders are migrated
          3. Ensure Jellyfin config and cache are migrated
          4. Run deploy phase: ansible-playbook main.yml --tags deploy
      tags: ["bootstrap"]

- name: Deploy stacks and configure services (phase 2/2)
  hosts: monolith
  gather_facts: false
  become: true
  vars_files:
    - vars.yml
    - vault.yml
  tasks:
    - name: Gather facts without privilege escalation
      ansible.builtin.setup:
      become: false
      tags: ["deploy", "setup"]

    - name: Ensure homelab-bridge Docker network exists
      community.docker.docker_network:
        name: homelab-bridge
        driver: bridge
        state: present
      tags: ["deploy", "network"]

    - name: Deploy Portainer server
      ansible.builtin.include_tasks: tasks/portainer.yml
      tags: ["deploy", "portainer"]

    - name: Deploy Docker Compose stacks (NPM, Pi-hole, Jellyfin)
      ansible.builtin.include_tasks: tasks/deploy_stacks.yml
      tags: ["deploy", "stacks"]

    - name: Run post-setup configuration for all services
      ansible.builtin.include_tasks: tasks/post_setup.yml
      tags: ["deploy", "post-setup"]

    - name: Display deployment completion
      ansible.builtin.debug:
        msg: |
          ✅ Deployment phase complete!
          
          Core services are running:
          - Nginx Proxy Manager: https://proxy.{{ local_domain }}:{{ proxy_host_port }}
          - Pi-hole: http://pihole.{{ local_domain }}:{{ pihole_host_port }}/admin
          - Jellyfin: http://jellyfin.{{ local_domain }}:{{ jellyfin_host_port }}/
          - Bazarr: http://bazarr.{{ local_domain }}:{{ bazarr_host_port }}/
          - Ollama: http://ollama.{{ local_domain }}/  (via NPM, port 11434)
          - Open WebUI: http://open-webui.{{ local_domain }}/  (via NPM, GPU-accelerated AI frontend)
          - Portainer: https://portainer.{{ local_domain }}:{{ portainer_host_port }}
          
          To verify:
          - SSH to monolith and run: docker ps
          - Check each service is accessible at URLs above
          - Verify GPU acceleration in Jellyfin: Dashboard -> Playback -> Hardware Acceleration (if enabled)
          - Verify Open WebUI can reach Ollama backend (check UI settings)
      tags: ["deploy"]