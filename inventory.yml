all:
  children:
    monolith:
      hosts:
        monolith:
          ansible_host: 192.168.1.17
          ansible_user: "{{ vault_admin_username | default('admin') }}"
          ansible_python_interpreter: "/usr/bin/python3"
      vars:
        # Monolith-wide configuration
        admin_user: "{{ vault_admin_username | default('admin') }}"
        python_version: "3.11"
        python_venv_name: "homelab-ansible"
        python_venv_path: "/opt/homelab-ansible"
        admin_ssh_key_public: "ssh-rsa  me@chadbartel.com"
        
        # Docker Stacks Configuration - all deploy to monolith
        portainer_stacks:
          - name: npm-stack
            compose_template: npm-compose.yml.j2
            target_host: monolith
          - name: pihole-stack
            compose_template: pihole-compose.yml.j2
            target_host: monolith
          - name: vpn-stack
            compose_template: openvpn-compose.yml.j2
            target_host: monolith
          - name: jellyfin-stack
            compose_template: jellyfin-compose.yml.j2
            target_host: monolith

    # Legacy nodes (archived, not used in active playbooks)
    _legacy_archive:
      hosts:
        pi4_01_archived:
          ansible_host: 192.168.1.10
          ansible_user: "{{ vault_admin_username | default('admin') }}"
          ansible_python_interpreter: "/usr/bin/python3"
        lenovo_server_archived:
          ansible_host: 192.168.1.12
          ansible_user: "{{ vault_admin_username | default('admin') }}"
          ansible_python_interpreter: "/usr/bin/python3"
        pi3_01_archived:
          ansible_host: 192.168.1.11
          ansible_user: "{{ vault_admin_username | default('admin') }}"
          ansible_python_interpreter: "/usr/bin/python3"
