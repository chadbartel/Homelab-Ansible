all:
  children:
    servers:
      hosts:
        pi4_01:
          ansible_host: 192.168.1.10
          ansible_user: "{{ vault_admin_username | default('admin') }}"
          ansible_python_interpreter: "/usr/bin/python3"
        lenovo_server:
          ansible_host: 192.168.1.12
          ansible_user: "{{ vault_admin_username | default('admin') }}"
          ansible_python_interpreter: "/usr/bin/python3"
        pi3_01:
          ansible_host: 192.168.1.11
          ansible_user: "{{ vault_admin_username | default('admin') }}"
          ansible_python_interpreter: "/usr/bin/python3"
        monolith:
          ansible_host: 192.168.1.17
          ansible_user: "{{ vault_admin_username | default('admin') }}"
          ansible_python_interpreter: "/usr/bin/python3"
      vars:
        # We will define the root admin user here
        admin_user: "{{ vault_admin_username | default('admin') }}"
        python_version: "3.11"
        python_venv_name: "homelab-ansible"
        python_venv_path: "/opt/homelab-ansible"
        admin_ssh_key_public: "ssh-rsa  me@chadbartel.com"
        
        # Docker Stacks Configuration
        portainer_stacks:
          - name: npm-stack
            compose_template: npm-compose.yml.j2
            target_host: pi4_01
          - name: pihole-stack
            compose_template: pihole-compose.yml.j2
            target_host: lenovo_server
          - name: vpn-stack
            compose_template: openvpn-compose.yml.j2
            target_host: pi4_01
          - name: jellyfin-stack
            compose_template: jellyfin-compose.yml.j2
            target_host: lenovo_server

    # Nodes that mount the SSD via NFS (all except Storage Host 192.168.1.12)
    nfs_client_nodes:
      hosts:
        pi4_01:
        pi3_01:

    arm_hosts:
      hosts:
        pi4_01:
        pi3_01:

    x86_hosts:
      hosts:
        lenovo_server:

    # Primary host (pi4_01 manages NPM, OpenVPN, Portainer Server)
    manager_nodes:
      hosts:
        pi4_01:

    # Portainer Server host
    portainer_server_hosts:
      hosts:
        pi4_01:

    # Portainer Agent hosts (lenovo_server and pi3_01)
    portainer_agent_hosts:
      hosts:
        lenovo_server:
        pi3_01:

    worker_nodes:
      hosts:
        lenovo_server:
        pi3_01:

    homelab_servers:
      children:
        arm_hosts:
        x86_hosts:
      vars:
        # We will define the root admin user here
        admin_user: "{{ vault_admin_username | default('admin') }}"
